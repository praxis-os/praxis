name: Benchmark Baseline

# Runs on every push to main and caches results for PR bench comparisons (D105).
on:
  push:
    branches: [main]

jobs:
  bench-baseline:
    name: bench-baseline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
      - name: Run benchmarks
        run: go test -bench=. -benchmem -count=5 ./... > bench-main.txt
      - name: Cache benchmark baseline
        uses: actions/cache/save@v4
        with:
          path: bench-main.txt
          key: bench-main-${{ github.sha }}
