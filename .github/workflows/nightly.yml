name: Nightly

on:
  schedule:
    # 03:00 UTC daily — property tests (D87)
    - cron: "0 3 * * *"
    # 04:00 UTC daily — conformance suite (D88)
    - cron: "0 4 * * *"
  workflow_dispatch: {}

jobs:
  property-tests:
    name: property-tests
    runs-on: ubuntu-latest
    # Stub: runs at 03:00 UTC. Full implementation requires gopter-based
    # property tests in state/... (D87). Until those tests exist this job
    # runs the standard test suite with the high-iteration environment
    # variable set as a placeholder.
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 3 * * *'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
      - name: Run property-based tests (100k iterations)
        id: run-tests
        run: |
          PRAXIS_PROP_ITERATIONS=100000 go test -race -count=1 ./... 2>&1 | tee test-output.txt
      - name: Open issue on failure
        if: failure()
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "Nightly property test failure"
          content-filepath: test-output.txt
          labels: |
            bug
            priority/high

  conformance:
    name: conformance
    runs-on: ubuntu-latest
    # Stub: runs at 04:00 UTC. Full implementation requires a live LLM
    # conformance suite in llm/conformance/... with ANTHROPIC_API_KEY and
    # OPENAI_API_KEY secrets (D88). Until that package exists this job is
    # a labelled placeholder that exits successfully.
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 4 * * *'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
      - name: Conformance suite (stub)
        run: |
          echo "Conformance suite stub — llm/conformance/ not yet implemented."
          echo "This job will run live LLM provider tests once the package exists."
          echo "Required secrets: ANTHROPIC_API_KEY, OPENAI_API_KEY"
          echo "Budget caps: PRAXIS_CONFORMANCE_MAX_TOKENS=100, PRAXIS_CONFORMANCE_MAX_COST_CENTS=50"
          exit 0
