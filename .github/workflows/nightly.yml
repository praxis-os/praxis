name: Nightly

on:
  schedule:
    # 03:00 UTC daily — property tests (D87)
    - cron: "0 3 * * *"
    # 04:00 UTC daily — conformance suite (D88)
    - cron: "0 4 * * *"
  workflow_dispatch: {}

jobs:
  property-tests:
    name: property-tests
    runs-on: ubuntu-latest
    # Stub: runs at 03:00 UTC. Full implementation requires gopter-based
    # property tests in state/... (D87). Until those tests exist this job
    # runs the standard test suite with the high-iteration environment
    # variable set as a placeholder.
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 3 * * *'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
      - name: Run property-based tests (100k iterations)
        id: run-tests
        run: |
          PRAXIS_PROP_ITERATIONS=100000 go test -race -count=1 ./... ./mcp/... ./skills/... 2>&1 | tee test-output.txt
      - name: Open issue on failure
        if: failure()
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "Nightly property test failure"
          content-filepath: test-output.txt
          labels: |
            bug
            priority/high

  conformance:
    name: conformance
    runs-on: ubuntu-latest
    # Runs at 04:00 UTC (D88). Requires ANTHROPIC_API_KEY and OPENAI_API_KEY
    # secrets. Budget-capped to short prompts (max 100 tokens per test).
    # On failure, opens a GitHub issue with the test output.
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 4 * * *'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
      - name: Run LLM conformance suite
        id: run-conformance
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          go test -tags conformance -v -count=1 -timeout=120s ./llm/conformance/ 2>&1 | tee conformance-output.txt
      - name: Open issue on failure
        if: failure()
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "Nightly conformance suite failure"
          content-filepath: conformance-output.txt
          labels: |
            bug
            priority/high
