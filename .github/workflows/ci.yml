name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
      - name: Run golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
          golangci-lint run

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
      - name: Run tests with coverage
        run: |
          go test -race -coverprofile=coverage.out -count=1 $(go list ./... | grep -v /examples/)
      - name: Check coverage threshold (85%)
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 85.0" | bc -l) )); then
            echo "Coverage ${COVERAGE}% is below the 85% threshold (D86)"
            exit 1
          fi

  commitsar:
    name: commitsar
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: aevea/commitsar@v0.20.2

  banned-grep:
    name: banned-grep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for banned identifiers
        run: make banned-grep

  spdx-check:
    name: spdx-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check SPDX headers on all Go files
        run: make spdx-check

  dco:
    name: dco
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # Validates that every non-merge commit in the PR carries a
      # Signed-off-by: line (DCO v1.1, D92). probot/dco is the org-level
      # GitHub App enforcing this as a required check; this step provides
      # an equivalent in-workflow validation.
      - name: Validate DCO Signed-off-by lines
        run: |
          MISSING=""
          while IFS= read -r sha; do
            BODY=$(git show -s --format="%B" "$sha")
            if ! echo "$BODY" | grep -q "^Signed-off-by:"; then
              SUBJECT=$(git show -s --format="%s" "$sha")
              MISSING="${MISSING}  ${sha} ${SUBJECT}\n"
            fi
          done < <(git log --no-merges --format="%H" "origin/main..HEAD")
          if [ -n "$MISSING" ]; then
            echo "Commits missing DCO Signed-off-by (git commit -s):"
            printf "$MISSING"
            exit 1
          fi
          echo "DCO check: PASS"

  bench:
    name: bench
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
      - name: Restore main-branch benchmark baseline
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: bench-main.txt
          key: bench-main-${{ github.sha }}
          restore-keys: bench-main-
      - name: Run benchmarks
        run: go test -bench=. -benchmem -count=5 ./... | tee bench-new.txt
      - name: Install benchstat
        run: go install golang.org/x/perf/cmd/benchstat@latest
      - name: Compare with baseline
        run: |
          if [ -f bench-main.txt ]; then
            benchstat bench-main.txt bench-new.txt
          else
            echo "No cached baseline found; skipping comparison (first run)"
            cat bench-new.txt
          fi

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: golang/govulncheck-action@v1
        with:
          go-version-input: "1.26.x"
          govulncheck-version: "latest"
