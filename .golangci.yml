# SPDX-License-Identifier: Apache-2.0

run:
  go: "1.23"
  timeout: 5m

linters:
  enable:
    - govet
    - errcheck
    - staticcheck
    - gosimple
    - unused
    - gosec
    - revive
    - misspell
    - unconvert
    - unparam
    - bodyclose
    - noctx
    - goconst
    - gocyclo

linters-settings:
  gocyclo:
    min-complexity: 15
  goconst:
    min-len: 3
    min-occurrences: 3
  gosec:
    excludes:
      - G104  # unhandled errors on deferred Close() in tests

issues:
  exclude-dirs:
    - vendor
    - examples
  exclude-rules:
    - linters: [revive]
      text: "stutters"
